<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Split-Screen Air Hockey</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* UI Overlay for Scores */
        .score-board {
            position: absolute;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }
        #score-p2 { top: 20px; transform: rotate(180deg); } /* Flipped for Player 2 */
        #score-p1 { bottom: 20px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="score-p2">Player 2: 0</div>
    <div id="score-p1">Player 1: 0</div>
    <div id="canvas-container"></div>

    <script>
        // --- Game Configuration & Constants ---
        const TABLE_WIDTH = 20;
        const TABLE_LENGTH = 36;
        const MALLET_RADIUS = 1.2;
        const PUCK_RADIUS = 0.8;
        const GOAL_WIDTH = 6;
        
        // Physics boundaries taking radii into account
        const MAX_X = TABLE_WIDTH / 2;
        const MAX_Z = TABLE_LENGTH / 2;

        let score1 = 0, score2 = 0;

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(0, 20, 0);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- Cameras (Split Screen) ---
        // P1 Camera (Bottom half, looking up from the south)
        const camera1 = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight / 2), 0.1, 1000);
        camera1.position.set(0, 15, 25);
        camera1.lookAt(0, 0, 5);

        // P2 Camera (Top half, looking down from the north - rotated 180 degrees)
        const camera2 = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight / 2), 0.1, 1000);
        camera2.position.set(0, 15, -25);
        camera2.lookAt(0, 0, -5);

        // --- Create Game Objects ---

        // 1. Table
        const tableGeo = new THREE.BoxGeometry(TABLE_WIDTH, 0.5, TABLE_LENGTH);
        const tableMat = new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.1 });
        const table = new THREE.Mesh(tableGeo, tableMat);
        table.position.y = -0.25;
        table.receiveShadow = true;
        scene.add(table);

        // Center line
        const centerLineGeo = new THREE.BoxGeometry(TABLE_WIDTH, 0.51, 0.2);
        const centerLineMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const centerLine = new THREE.Mesh(centerLineGeo, centerLineMat);
        centerLine.position.y = -0.24;
        scene.add(centerLine);

        // 2. Mallets (Strikers)
        const malletGeo = new THREE.CylinderGeometry(MALLET_RADIUS, MALLET_RADIUS, 0.8, 32);
        const malletMat1 = new THREE.MeshStandardMaterial({ color: 0x00ff00, roughness: 0.3 });
        const malletMat2 = new THREE.MeshStandardMaterial({ color: 0x0088ff, roughness: 0.3 });

        const mallet1 = new THREE.Mesh(malletGeo, malletMat1);
        mallet1.position.set(0, 0.4, 12);
        mallet1.castShadow = true;
        scene.add(mallet1);

        const mallet2 = new THREE.Mesh(malletGeo, malletMat2);
        mallet2.position.set(0, 0.4, -12);
        mallet2.castShadow = true;
        scene.add(mallet2);

        // 3. Puck
        const puckGeo = new THREE.CylinderGeometry(PUCK_RADIUS, PUCK_RADIUS, 0.4, 24);
        const puckMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.1 });
        const puck = new THREE.Mesh(puckGeo, puckMat);
        puck.position.set(0, 0.2, 0);
        puck.castShadow = true;
        scene.add(puck);

        // Puck Physics Variables
        let puckVel = new THREE.Vector3(0, 0, 0);
        const friction = 0.993;

        // --- Touch Controls Logic ---
        // Raycasting setup to map 2D screen touches to the 3D table plane
        const raycaster = new THREE.Raycaster();
        const planeZ = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0); // Flat plane at y=0

        // Track active touches mapped to players
        let activeTouches = {}; 

        function handleTouch(e) {
            e.preventDefault(); // Prevent scrolling/zooming
            
            const rect = renderer.domElement.getBoundingClientRect();
            
            // Loop through all current touches on the screen
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                
                // Calculate normalized device coordinates (-1 to +1) for the touch
                const mouseX = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
                const mouseY = -((touch.clientY - rect.top) / rect.height) * 2 + 1;

                // Determine which half of the screen was touched
                // Top half is Player 2, Bottom half is Player 1
                const isTopHalf = touch.clientY < window.innerHeight / 2;

                raycaster.setFromCamera(new THREE.Vector2(mouseX, mouseY), isTopHalf ? camera2 : camera1);
                
                const targetPoint = new THREE.Vector3();
                raycaster.ray.intersectPlane(planeZ, targetPoint);

                if (isTopHalf) {
                    // Player 2 Control (Constrained to North side of table)
                    mallet2.position.x = Math.max(-MAX_X + MALLET_RADIUS, Math.min(MAX_X - MALLET_RADIUS, targetPoint.x));
                    mallet2.position.z = Math.max(-MAX_Z + MALLET_RADIUS, Math.min(-0.1 - MALLET_RADIUS, targetPoint.z));
                } else {
                    // Player 1 Control (Constrained to South side of table)
                    mallet1.position.x = Math.max(-MAX_X + MALLET_RADIUS, Math.min(MAX_X - MALLET_RADIUS, targetPoint.x));
                    mallet1.position.z = Math.max(0.1 + MALLET_RADIUS, Math.min(MAX_Z - MALLET_RADIUS, targetPoint.z));
                }
            }
        }

        // Attach touch listeners directly to window
        window.addEventListener('touchstart', handleTouch, { passive: false });
        window.addEventListener('touchmove', handleTouch, { passive: false });
        window.addEventListener('touchend', handleTouch, { passive: false });

        // --- Reset Functions ---
        function resetPuck(scoringPlayer) {
            puck.position.set(0, 0.2, scoringPlayer === 1 ? -6 : 6);
            puckVel.set(0, 0, 0);
        }

        function updateScoreUI() {
            document.getElementById('score-1').innerText = `Player 1: ${score1}`;
            document.getElementById('score-2').innerText = `Player 2: ${score2}`;
        }

        // --- Physics & Collision Engine ---
        function updatePhysics() {
            // Apply friction
            puckVel.multiplyScalar(friction);
            
            // Update position
            puck.position.add(puckVel);

            // 1. Wall Collisions (X-Axis / Sides)
            if (Math.abs(puck.position.x) > (MAX_X - PUCK_RADIUS)) {
                puck.position.x = Math.sign(puck.position.x) * (MAX_X - PUCK_RADIUS);
                puckVel.x *= -1;
            }

            // 2. Goal / Endline Collisions (Z-Axis)
            if (Math.abs(puck.position.z) > (MAX_Z - PUCK_RADIUS)) {
                // Check if it's in the goal width
                if (Math.abs(puck.position.x) < GOAL_WIDTH / 2) {
                    // Goal scored!
                    if (puck.position.z > 0) {
                        score2++;
                        document.getElementById('score-p2').innerText = `Player 2: ${score2}`;
                        resetPuck(2);
                    } else {
                        score1++;
                        document.getElementById('score-p1').innerText = `Player 1: ${score1}`;
                        resetPuck(1);
                    }
                    return;
                } else {
                    // Hit the end wall instead of goal
                    puck.position.z = Math.sign(puck.position.z) * (MAX_Z - PUCK_RADIUS);
                    puckVel.z *= -1;
                }
            }

            // 3. Mallet-Puck Collisions
            handleMalletCollision(mallet1);
            handleMalletCollision(mallet2);
        }

        function handleMalletCollision(mallet) {
            // Calculate distance between centers on the XZ plane
            const dx = puck.position.x - mallet.position.x;
            const dz = puck.position.z - mallet.position.z;
            const distance = Math.sqrt(dx * dx + dz * dz);
            const minDist = MALLET_RADIUS + PUCK_RADIUS;

            if (distance < minDist) {
                // Normal vector of collision
                const nx = dx / distance;
                const nz = dz / distance;

                // Push puck out of mallet to prevent sticking
                puck.position.x = mallet.position.x + nx * minDist;
                puck.position.z = mallet.position.z + nz * minDist;

                // Simple elastic reflection combined with giving the puck momentum from mallet speed
                // For mobile touch, we simulate velocity based on positioning changes 
                const speedTransfer = 0.5; 
                puckVel.set(nx, 0, nz).multiplyScalar(Math.max(5, puckVel.length() * 1.1 + speedTransfer));
                
                // Cap maximum speed
                const maxSpeed = 1.2;
                if(puckVel.length() > maxSpeed) {
                    puckVel.setLength(maxSpeed);
                }
            }
        }

        // --- Game Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Step physics
            updatePhysics();

            // Render Split Screen Viewports
            const w = window.innerWidth;
            const h = window.innerHeight;

            // Bottom Viewport - Player 1
            renderer.setViewport(0, 0, w, h / 2);
            renderer.setScissor(0, 0, w, h / 2);
            renderer.setScissorTest(true);
            renderer.render(scene, camera1);

            // Top Viewport - Player 2
            renderer.setViewport(0, h / 2, w, h / 2);
            renderer.setScissor(0, h / 2, w, h / 2);
            renderer.setScissorTest(true);
            renderer.render(scene, camera2);
        }

        // Handle window resizing smoothly
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            renderer.setSize(w, h);
            
            camera1.aspect = w / (h / 2);
            camera1.updateProjectionMatrix();
            
            camera2.aspect = w / (h / 2);
            camera2.updateProjectionMatrix();
        });

        // Start the game loop
        animate();
    </script>
</body>
</html>
