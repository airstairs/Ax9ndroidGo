<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Spinning Cube</title>
    <style>
        /* This hides scrollbars and forces the 3D canvas to fill the entire screen */
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000000;
        }
    </style>
</head>
<body>

    <!-- 1. Load the Three.js library first -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script> -->
    <script src="three.min.js"></script>

    <!-- 2. Put your custom JS code right below it -->
    <script>
        // 1. Create the Scene
        const scene = new THREE.Scene();

        // 2. Create the Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5; 

        // 3. Create the Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement); 

        // 4. Create the Cube (Green Wireframe)
        const geometry = new THREE.BoxGeometry(1, 1, 1); 
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true }); 
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube); 

        // 5. Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // Rotate the cube
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;

            renderer.render(scene, camera);
        }
        animate();

        // 6. Handle Window Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
