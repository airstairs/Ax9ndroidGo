<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Touch-Enabled Orbit Controls</title>
    <style>
        /* Remove default margins and hide scrollbars to make the canvas full-screen */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            pointer-events: none; /* Allows touch events to pass through to the canvas */
            font-size: 14px;
        }
    </style>
    <!-- Import maps polyfill for browsers that don't support import maps natively -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

    <!-- Using an import map to cleanly load Three.js and its modules via CDN -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="info">Drag to rotate | Pinch to zoom (Works on Touch Screens!)</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Setup the Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5; // Move camera back so we can see the cube

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimizes performance on high-res mobile screens
        document.body.appendChild(renderer.domElement);

        // 2. Initialize OrbitControls (This handles both Mouse and Touch inputs automatically)
        const controls = new OrbitControls(camera, renderer.domElement);
        
        // Optional: Add some damping (inertia) to make the spinning feel smoother
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;


        // 3. Create a Cube with lighting-reactive material
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x3498db,
            roughness: 0.4,
            metalness: 0.2
        });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        // 3. Create a Cube with lighting-reactive material 2
        const cube1 = new THREE.Mesh(geometry, material);
        scene.add(cube1);
	// cube.position.set(x, y, z)
	cube.position.set(5, 2, -3);

        // 4. Add Lighting (Necessary for MeshStandardMaterial to show depth and color)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // 5. Handle Window Resizing dynamically
        window.addEventListener('resize', () => {
            // Update camera aspect ratio
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            
            // Update renderer size
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 6. The Animation/Render Loop
        function animate() {
            requestAnimationFrame(animate);

            // Optional: Gently rotate the cube on its own when not being touched
            // Remove these two lines if you only want it to move via touch/mouse
            cube.rotation.x += 0.005;
            cube.rotation.y += 0.005;

            // Required if enableDamping or auto-rotation is enabled
            controls.update();

            // Render the updated scene
            renderer.render(scene, camera);
        }

        // Start the animation loop
        animate();
    </script>
</body>
</html>
